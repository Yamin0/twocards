<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#d5dbd9",
                        "tertiary": "#001b40",
                        "surface-tint": "#455e8d",
                        "primary-container": "#13305c",
                        "outline-variant": "#c4c6d0",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f5fbf9",
                        "surface-container": "#e9efed",
                        "primary": "#001b40",
                        "on-primary-container": "#8099cb",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed-dim": "#aec7fb",
                        "error": "#ba1a1a",
                        "on-surface": "#171d1c",
                        "inverse-surface": "#2b3231",
                        "on-secondary-fixed": "#171d1c",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#13305c",
                        "surface-container-low": "#eff5f3",
                        "on-primary-fixed-variant": "#2c4674",
                        "on-background": "#171d1c",
                        "secondary-fixed-dim": "#c2c8c6",
                        "on-tertiary-fixed": "#001b3f",
                        "primary-fixed-dim": "#adc7fc",
                        "on-secondary-fixed-variant": "#424847",
                        "surface": "#f5fbf9",
                        "on-primary-fixed": "#001b3f",
                        "on-surface-variant": "#44474f",
                        "secondary": "#59605e",
                        "inverse-primary": "#adc7fc",
                        "outline": "#747780",
                        "primary-fixed": "#d7e2ff",
                        "on-tertiary-fixed-variant": "#2d4673",
                        "secondary-fixed": "#dee4e2",
                        "surface-bright": "#f5fbf9",
                        "secondary-container": "#dbe1df",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e3e9e8",
                        "inverse-on-surface": "#ecf2f0",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#d7e2ff",
                        "surface-variant": "#dee4e2",
                        "surface-container-highest": "#dee4e2",
                        "on-secondary-container": "#5d6463",
                        "on-tertiary-container": "#8099cb"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col selection:bg-primary-fixed-dim">
<!-- Header / Logo Anchor -->
<header class="w-full flex justify-center py-12">
<span class="text-2xl font-bold tracking-tighter text-primary">twocards.</span>
</header>
<main class="flex-grow flex items-center justify-center px-6 pb-24">
<!-- Main Form Container -->
<div class="w-full max-w-2xl bg-surface-container-lowest p-8 md:p-16 shadow-[0px_48px_80px_rgba(19,48,92,0.04)] rounded-none relative">
<!-- Asymmetric Headline -->
<div class="mb-12 border-l-2 border-primary pl-6">
<h1 class="text-4xl md:text-5xl font-extrabold text-primary tracking-tight leading-none mb-4">
                    Créer votre compte
                </h1>
<p class="text-on-surface-variant font-body text-sm max-w-md">
                    Rejoignez l'élite du Ledger. Une interface de précision pour la gestion de vos flux nocturnes.
                </p>
</div>
<form class="space-y-12">
<!-- Role Selector (Asymmetric Bento Style) -->
<div>
<label class="block font-label text-[0.6875rem] uppercase tracking-[0.05em] text-on-primary-container mb-6">
                        Sélectionnez votre profil
                    </label>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Role 1 -->
<label class="group relative flex flex-col p-6 bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all duration-300">
<input checked="" class="hidden peer" name="role" type="radio"/>
<div class="flex justify-between items-start mb-4">
<span class="material-symbols-outlined text-primary text-3xl">night_shelter</span>
<div class="w-2 h-2 rounded-full border border-primary group-peer-checked:bg-primary"></div>
</div>
<span class="text-lg font-headline font-bold text-primary mb-1">Établissement</span>
<p class="text-xs text-on-surface-variant leading-relaxed">Club, Restaurant ou Lounge gérant ses propres listes.</p>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary pointer-events-none"></div>
</label>
<!-- Role 2 -->
<label class="group relative flex flex-col p-6 bg-surface-container-low cursor-pointer hover:bg-surface-container transition-all duration-300">
<input class="hidden peer" name="role" type="radio"/>
<div class="flex justify-between items-start mb-4">
<span class="material-symbols-outlined text-primary text-3xl">badge</span>
<div class="w-2 h-2 rounded-full border border-primary group-peer-checked:bg-primary"></div>
</div>
<span class="text-lg font-headline font-bold text-primary mb-1">Concierge/RP</span>
<p class="text-xs text-on-surface-variant leading-relaxed">Agent indépendant ou agence de promotion événementielle.</p>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary pointer-events-none"></div>
</label>
</div>
</div>
<!-- Personal Information Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="col-span-2">
<label class="block font-label text-[0.6875rem] uppercase tracking-[0.05em] text-on-primary-container mb-2">Informations personnelles</label>
</div>
<div class="flex flex-col space-y-1">
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 px-4 py-3 text-sm focus:border-primary focus:ring-0 transition-colors outline-none placeholder:text-outline" placeholder="Nom complet" type="text"/>
</div>
<div class="flex flex-col space-y-1">
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 px-4 py-3 text-sm focus:border-primary focus:ring-0 transition-colors outline-none placeholder:text-outline" placeholder="Email professionnel" type="email"/>
</div>
<div class="flex flex-col space-y-1">
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 px-4 py-3 text-sm focus:border-primary focus:ring-0 transition-colors outline-none placeholder:text-outline" placeholder="Mot de passe" type="password"/>
</div>
<div class="flex flex-col space-y-1">
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 px-4 py-3 text-sm focus:border-primary focus:ring-0 transition-colors outline-none placeholder:text-outline" placeholder="Numéro de téléphone" type="tel"/>
</div>
</div>
<!-- Conditional Details Section: Establishment (Default Visible for Demo) -->
<div class="pt-6 border-t border-surface-container">
<label class="block font-label text-[0.6875rem] uppercase tracking-[0.05em] text-on-primary-container mb-6">Détails de l'établissement</label>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<div class="col-span-2 md:col-span-1 flex flex-col space-y-1">
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 px-4 py-3 text-sm focus:border-primary focus:ring-0 transition-colors outline-none placeholder:text-outline" placeholder="Nom de l'établissement" type="text"/>
</div>
<div class="flex flex-col space-y-1">
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 px-4 py-3 text-sm focus:border-primary focus:ring-0 transition-colors outline-none placeholder:text-outline" placeholder="Ville" type="text"/>
</div>
<div class="col-span-2">
<div class="flex flex-wrap gap-3">
<label class="inline-flex items-center space-x-2 bg-surface-container-low px-4 py-2 text-[0.75rem] font-medium text-primary cursor-pointer hover:bg-surface-container-high">
<input class="text-primary focus:ring-0" name="venue_type" type="radio"/>
<span>Club</span>
</label>
<label class="inline-flex items-center space-x-2 bg-surface-container-low px-4 py-2 text-[0.75rem] font-medium text-primary cursor-pointer hover:bg-surface-container-high">
<input class="text-primary focus:ring-0" name="venue_type" type="radio"/>
<span>Restaurant</span>
</label>
<label class="inline-flex items-center space-x-2 bg-surface-container-low px-4 py-2 text-[0.75rem] font-medium text-primary cursor-pointer hover:bg-surface-container-high">
<input class="text-primary focus:ring-0" name="venue_type" type="radio"/>
<span>Lounge</span>
</label>
<label class="inline-flex items-center space-x-2 bg-surface-container-low px-4 py-2 text-[0.75rem] font-medium text-primary cursor-pointer hover:bg-surface-container-high">
<input class="text-primary focus:ring-0" name="venue_type" type="radio"/>
<span>Bar</span>
</label>
</div>
</div>
</div>
</div>
<!-- Call to Action -->
<div class="pt-8 flex flex-col items-start space-y-6">
<button class="w-full md:w-auto bg-primary text-on-primary font-headline font-bold text-sm px-10 py-4 tracking-tight hover:bg-primary-container transition-all active:scale-95 duration-150" type="submit">
                        Créer mon compte
                    </button>
<div class="flex items-center space-x-2">
<span class="text-xs text-on-surface-variant font-body">Déjà un compte ?</span>
<a class="text-xs font-bold text-primary underline underline-offset-4 hover:text-primary-container transition-colors" href="#">Se connecter</a>
</div>
</div>
</form>
</div>
</main>
<!-- Footer Identity -->
<footer class="w-full bg-surface-container-low py-12 px-8 flex flex-col md:flex-row justify-between items-center border-t border-outline-variant/10">
<div class="mb-6 md:mb-0">
<span class="font-label text-[0.6875rem] uppercase tracking-[0.05em] text-on-primary-container">
                © 2024 The Velvet Ledger. Tous droits réservés.
            </span>
</div>
<div class="flex space-x-8">
<a class="font-label text-[0.6875rem] uppercase tracking-[0.05em] text-on-primary-container hover:text-primary transition-colors" href="#">Confidentialité</a>
<a class="font-label text-[0.6875rem] uppercase tracking-[0.05em] text-on-primary-container hover:text-primary transition-colors" href="#">Conditions d'utilisation</a>
<a class="font-label text-[0.6875rem] uppercase tracking-[0.05em] text-on-primary-container hover:text-primary transition-colors" href="#">Support</a>
</div>
</footer>
<!-- Aesthetic Decorative Element -->
<div class="fixed top-0 right-0 w-1/3 h-full pointer-events-none overflow-hidden opacity-20 -z-10">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 right-0 w-64 h-64 bg-primary/10 rounded-full blur-3xl"></div>
</div>
</body></html>
